# ============================================================
# Deep Dive — Docker Compose
# ============================================================
# Usage:
#   1. Copy .env.example to .env and fill in API keys
#   2. docker compose up --build
#   3. Open http://localhost:8000
# ============================================================

services:
  deep-dive:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
    restart: unless-stopped
