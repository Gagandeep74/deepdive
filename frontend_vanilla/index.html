<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Deep Dive — Multi-Agent AI Research & Report Generation System">
    <title>Deep Dive — AI Research</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=4">
</head>
<body>
    <div class="app">

        <!-- Header -->
        <header class="header" data-entrance="0">
            <div class="header-inner">
                <div class="logo">
                    <svg class="logo-svg" width="36" height="36" viewBox="0 0 36 36" fill="none">
                        <circle cx="18" cy="18" r="16" stroke="url(#lg)" stroke-width="1.5" opacity="0.5"/>
                        <circle cx="18" cy="10" r="3" fill="url(#lg)"/>
                        <circle cx="10" cy="24" r="3" fill="url(#lg)" opacity="0.6"/>
                        <circle cx="26" cy="24" r="3" fill="url(#lg)" opacity="0.6"/>
                        <line x1="18" y1="13" x2="10" y2="21" stroke="url(#lg)" stroke-width="1.5" opacity="0.4"/>
                        <line x1="18" y1="13" x2="26" y2="21" stroke="url(#lg)" stroke-width="1.5" opacity="0.4"/>
                        <defs><linearGradient id="lg" x1="0" y1="0" x2="36" y2="36"><stop stop-color="#7C3AED"/><stop offset="1" stop-color="#06B6D4"/></linearGradient></defs>
                    </svg>
                    <span class="logo-name">Deep Dive</span>
                </div>
                <nav class="header-nav">
                    <span class="nav-pill">Multi-Agent Research</span>
                    <span class="nav-pill nav-pill-dim">v2.0</span>
                    <button id="theme-toggle" class="nav-pill nav-pill-btn" title="Toggle theme">🌓</button>
                </nav>
            </div>
        </header>

        <!-- Content -->
        <div class="content-wrap">

            <!-- Sidebar -->
            <aside class="sidebar" id="history-sidebar" data-entrance="1">
                <div class="sidebar-label">History</div>
                <div class="sidebar-list" id="history-list"></div>
            </aside>

            <main class="main">

                <!-- Config -->
                <section class="config-section" id="input-section" data-entrance="1">
                    <div class="config-bar">
                        <div class="config-pill-group">
                            <label class="pill-label" for="provider-select">Node</label>
                            <select id="provider-select" class="pill-select">
                                <option value="fireworks">Fireworks AI</option>
                                <option value="amd_cloud">AMD MI300X</option>
                            </select>
                        </div>
                        <div class="config-pill-group">
                            <label class="pill-label" for="depth-select">Depth</label>
                            <select id="depth-select" class="pill-select">
                                <option value="quick">Quick · 2</option>
                                <option value="standard" selected>Standard · 5</option>
                                <option value="deep">Deep · 10</option>
                            </select>
                        </div>
                    </div>
                    <div class="topic-bar">
                        <input type="text" id="topic-input" class="topic-input" placeholder="What do you want to research?" autocomplete="off">
                        <button id="start-btn" class="run-btn" onclick="startResearch()">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            <span>Run</span>
                        </button>
                    </div>
                </section>

                <!-- Pipeline + Orb -->
                <section class="pipeline-section hidden" id="status-section" data-entrance="2">
                    <div class="orb-arena">
                        <!-- The Orb -->
                        <div class="orb" id="the-orb"></div>
                        <div class="orb-ring"></div>

                        <!-- Orbit Chips -->
                        <div class="orbit-chip" id="orbit-planner" data-agent="planner" data-orbit="0">
                            <span class="oc-dot"></span><span class="oc-label">Planner</span>
                        </div>
                        <div class="orbit-chip" id="orbit-researchers" data-agent="researchers" data-orbit="1">
                            <span class="oc-dot"></span><span class="oc-label">Researchers</span><span class="oc-counter" id="researcher-counter"></span>
                        </div>
                        <div class="orbit-chip" id="orbit-synthesizer" data-agent="synthesizer" data-orbit="2">
                            <span class="oc-dot"></span><span class="oc-label">Synthesizer</span>
                        </div>
                        <div class="orbit-chip" id="orbit-critic" data-agent="critic" data-orbit="3">
                            <span class="oc-dot"></span><span class="oc-label">Critic</span>
                        </div>
                    </div>

                    <!-- Status Details (below orb) -->
                    <div class="status-details">
                        <div class="status-row" id="agent-planner" data-state="idle">
                            <span class="sr-name">Planner</span>
                            <span class="sr-status" id="status-planner">Idle</span>
                            <span class="sr-detail" id="detail-planner"></span>
                            <span class="agent-badge" id="badge-planner"></span>
                        </div>
                        <div class="status-row status-row-wide" id="agent-researchers" data-state="idle">
                            <span class="sr-name">Researchers</span>
                            <span class="sr-status" id="status-researchers">Idle</span>
                            <div class="researcher-chips" id="researcher-chips"></div>
                            <span class="agent-badge" id="badge-researcher"></span>
                        </div>
                        <div class="status-row" id="agent-synthesizer" data-state="idle">
                            <span class="sr-name">Synthesizer</span>
                            <span class="sr-status" id="status-synthesizer">Idle</span>
                            <span class="sr-detail" id="detail-synthesizer"></span>
                            <span class="agent-badge" id="badge-synthesizer"></span>
                        </div>
                        <div class="status-row" id="agent-critic" data-state="idle">
                            <span class="sr-name">Critic</span>
                            <span class="sr-status" id="status-critic">Idle</span>
                            <span class="sr-detail" id="detail-critic"></span>
                            <span class="agent-badge" id="badge-critic"></span>
                        </div>
                    </div>
                </section>

                <!-- Report -->
                <section class="report-section hidden" id="report-section">
                    <div class="report-bar">
                        <h2 class="report-title">Research Report</h2>
                        <div class="report-actions">
                            <button class="pill-btn-sm" onclick="copyReport()">⎘ Copy</button>
                            <button class="pill-btn-sm" onclick="exportMarkdown()">↓ .md</button>
                            <button class="pill-btn-sm" onclick="window.print()">⎙ PDF</button>
                        </div>
                    </div>
                    <div class="report-providers" id="report-providers"></div>
                    <article class="report-content glass-panel" id="report-content"></article>
                </section>

                <!-- Error -->
                <section class="error-section hidden" id="error-section">
                    <div class="error-card glass-panel">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#F87171" stroke-width="2"/><line x1="12" y1="8" x2="12" y2="13" stroke="#F87171" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="16" r="1" fill="#F87171"/></svg>
                        <span id="error-message">An error occurred</span>
                    </div>
                </section>
            </main>
        </div>

        <footer class="footer" data-entrance="3">
            <span>Built for AMD AI Hackathon</span>
            <span class="footer-dot">·</span>
            <span>Powered by CrewAI + Fireworks AI</span>
        </footer>
    </div>

    <!-- Modal -->
    <div id="notes-modal" class="modal hidden">
        <div class="modal-pane glass-panel">
            <div class="modal-top">
                <h3 id="modal-title">Raw Research Notes</h3>
                <button class="close-x" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body"><pre id="modal-text"></pre></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js?v=4"></script>
</body>
</html>
